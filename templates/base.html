<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CodeSearch{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="{{ url_for('home') }}" class="logo">
        <span class="logo-mark">⌬</span>
        <span class="logo-name">CodeSearch</span>
      </a>
      <span class="header-tag">TF-IDF · LeetCode Search</span>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        Built with Python, Flask &amp; TF-IDF &nbsp;·&nbsp;
        <a href="https://github.com/dhanraj989/Coding_questions_search_engine"
           target="_blank" rel="noopener">GitHub</a>
      </p>
    </div>
  </footer>

</body>
</html>
